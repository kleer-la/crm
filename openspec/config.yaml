schema: spec-driven

context: |

  Tech stack:
    Rails 8, PostgreSQL, Hotwire (Turbo + Stimulus), Tailwind CSS

  Auth:
    Google OAuth via omniauth-google-oauth2 (self-registration, admin role assignment, no devise)

  Background jobs:
    Solid Queue

  Testing:
    All implementation tasks must include tests.
    Use Rails default Minitest (model tests, controller tests, integration tests).
    Use FactoryBot for test data generation.
    Test models for validations, associations, callbacks, and scopes.
    Test controllers for CRUD actions, authorization, and edge cases.
    Test service objects for happy path and error scenarios.

  Domain:
    Internal consulting CRM for a small team (6-15 people)
    All monetary values in USD, stored as decimal(12,2)
    Prospects have inline contact fields (primary_contact_name, email, phone) — not a Contact association
    Customers have many Contacts (with primary flag enforcement)
    Prospects can be converted to Customers (becomes read-only), but not vice versa
    Proposals are polymorphically linked to Prospects or Customers
    Customer total_revenue is auto-calculated from Won proposal estimated_values (final_value field removed)
    Tasks are polymorphically linked to Prospects, Customers, or Proposals
    ActivityLog is append-only (immutable after creation)
    Admin users can manage all users; consultants can manage their assigned records