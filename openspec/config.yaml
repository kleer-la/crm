schema: spec-driven

context: |
 
  Tech stack:
    Rails 8, PostgreSQL, Hotwire (Turbo + Stimulus), Tailwind CSS

  Auth:
    Google OAuth via omniauth-google-oauth2 (self-registration, admin role assignment, no devise)

  Background jobs:
    Solid Queue

  Domain:
    Internal consulting CRM for a small team (6-15 people)
    All monetary values in USD, stored as decimal(12,2)
    Prospects and Customer are separate models, but both have many Contacts
    Prospects can be converted to Customers, but not vice versa
    Customers have many Proposals, which have many Tasks
    Tasks have a status (pending, completed, overdue) and a due date
    Proposals have a total value, calculated from associated Tasks
    Users can comment on Proposals and Tasks
    Admin users can manage all records, regular users can only manage records they created

  Migration
    We have some spreadsheet data to import, but we can start with an empty database and add seed data later    