# Name of your application. Used to uniquely configure containers.
service: crm

# Name of the container image.
image: carlospeix/crm

# Deploy to these servers.
servers:
  web:
    - 5.78.92.152

# Enable SSL auto certification via Let's Encrypt.
# Requires config.assume_ssl and config.force_ssl in production.rb.
proxy:
  ssl: true
  host: crm.kleer.la

# Docker Hub registry.
registry:
  username: carlospeix
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - KAPSO_WEBHOOK_SECRET
    - BUILD_INFO
    - META_WEBHOOK_VERIFY_TOKEN
  clear:
    SOLID_QUEUE_IN_PUMA: true

# Aliases are triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Use a persistent storage volume for local Active Storage files.
volumes:
  - "crm_storage:/rails/storage"

# Bridge fingerprinted assets between versions to avoid 404 on in-flight requests.
asset_path: /rails/public/assets

# Configure the image builder.
builder:
  arch: amd64

# SSH user
ssh:
  user: appuser
